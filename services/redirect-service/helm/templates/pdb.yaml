{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "redirect-service.fullname" . }}
  labels:
    {{- include "redirect-service.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "redirect-service.selectorLabels" . | nindent 6 }}
{{- end }}
