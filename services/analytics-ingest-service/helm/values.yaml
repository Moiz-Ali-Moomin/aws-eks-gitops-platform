replicaCount: 2

autoscaling:
  enabled: false

global:
  awsAccountId: ""
  awsRegion: "us-east-1"
  image:
    registry: ""
    project: ""
    repository: ecommerce-repo

image:
  name: analytics-ingest-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  KAFKA_BROKERS: "ecommerce-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.platform-observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "analytics-ingest-service"

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true

  name: analytics-ingest-service


podDisruptionBudget:
  enabled: true
