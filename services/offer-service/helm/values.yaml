replicaCount: 2

autoscaling:
  enabled: false

global:
  awsAccountId: ""
  awsRegion: "us-east-1"
  image:
    registry: ""
    project: ""
    repository: ecommerce-repo

image:
  name: offer-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:

  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.platform-observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "offer-service"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceAccount:
  create: true

  name: offer-service


podDisruptionBudget:
  enabled: true
