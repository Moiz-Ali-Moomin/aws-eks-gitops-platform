apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "storefront-service.fullname" . }}
  labels:
    {{- include "storefront-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "storefront-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data-postgres
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data-redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
