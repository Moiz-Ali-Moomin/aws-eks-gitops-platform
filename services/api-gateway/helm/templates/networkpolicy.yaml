apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "api-gateway.fullname" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchLabels:
      {{- include "api-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data-postgres
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data-redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
