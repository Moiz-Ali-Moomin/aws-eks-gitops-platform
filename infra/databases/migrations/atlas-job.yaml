apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-postgres-migration
  namespace: data-postgres
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: atlas
        image: arigaio/atlas:latest-alpine
        command:
        - atlas
        - schema
        - apply
        - -u
        - "postgres://${DB_USER}:${DB_PASSWORD}@postgres-primary.data-postgres.svc.cluster.local:5432/orders"
        - --to
        - "file:///migrations"
        - --auto-approve
        volumeMounts:
        - name: schema-volume
          mountPath: /migrations
      restartPolicy: Never
      volumes:
      - name: schema-volume
        configMap:
          name: orders-schema-config
