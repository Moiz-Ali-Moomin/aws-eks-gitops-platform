# Airflow Helm Chart Configuration
# Chart: apache-airflow/airflow v1.18.x

executor: LocalExecutor

images:
  airflow:
    # IMPORTANT: Replace with your actual AWS Account ID or inject via ArgoCD globals
    repository: "{{ .Values.global.awsAccountId }}.dkr.ecr.{{ .Values.global.awsRegion }}.amazonaws.com/ecommerce-repo/airflow"
    tag: latest
    pullPolicy: Always

# FIXED PostgreSQL image tag
postgresql:
  enabled: true

  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 16.4.0-debian-12-r0   # ✅ VALID tag

  auth:
    enablePostgresUser: true
    existingSecret: airflow-metadata-secret
    secretKeys:
      adminPasswordKey: password
    username: airflow
    database: airflow

  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: gp3


# DAGs local mount
dags:
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: gp3


# Logs persistence
logs:
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3


# Disable hooks (prevents timeout)
createUserJob:
  useHelmHooks: false

migrateDatabaseJob:
  useHelmHooks: false


scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi


webserver:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi


workers:
  replicas: 0


triggerer:
  replicas: 0

dagProcessor:
  replicas: 0

flower:
  enabled: false


rbac:
  create: true


serviceAccount:
  create: true
  name: airflow-service-account
