apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 5
  strategy:
    canary:
      # Istio traffic routing definition
      trafficRouting:
        istio:
          virtualService: 
            name: order-service-routing
          destinationRule:
            name: order-service-resilience
            canarySubsetName: canary
            stableSubsetName: stable
      # Progressive rollout steps
      steps:
      - setWeight: 5
      - pause: {duration: 5m} # Wait 5m to analyze Prometheus metrics via AnalysisRun
      - setWeight: 20
      - pause: {duration: 10m}
      - setWeight: 50
      - pause: {duration: 5m}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      serviceAccountName: order-service-sa
      containers:
      - name: order-service
        image: us-central1-docker.pkg.dev/my-project/ecommerce-repo/order-service:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
