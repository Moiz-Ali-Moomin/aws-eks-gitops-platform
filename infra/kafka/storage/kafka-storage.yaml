apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: kafka-fast-storage
  labels:
    app: kafka
    tier: data
    workload: streaming
  annotations:
    description: "High-performance storage class for Kafka brokers on EKS"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Retain          # 🔥 Prevents accidental data loss
