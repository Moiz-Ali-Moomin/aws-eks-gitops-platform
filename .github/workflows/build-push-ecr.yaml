name: Build and Push Microservices to ECR

on:
  push:
    branches: ["main"]
    paths:
      - "services/**"
      - "Dockerfile.services"
  workflow_dispatch:
    inputs:
      service:
        description: "Single service to build (blank = all)"
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # --------------------------------------------------
  # Discover which services changed (or build all on dispatch)
  # --------------------------------------------------
  detect:
    name: Detect services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          if [[ -n "${{ github.event.inputs.service }}" ]]; then
            # Manual dispatch with a specific service
            echo "matrix=[\"${{ github.event.inputs.service }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES=(
            api-gateway
            auth-service
            user-service
            product-service
            order-service
            cart-service
            notification-service
            reporting-service
            redirect-service
            landing-service
            offer-service
            feature-flag-service
            attribution-service
            analytics-ingest-service
            audit-service
            conversion-webhook
            admin-backoffice-service
            storefront-service
            storefront-web
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch without specific service — build all
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
            echo "matrix=${JSON}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On push: detect changed services
          CHANGED=()
          for SVC in "${SERVICES[@]}"; do
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^services/${SVC}/"; then
              CHANGED+=("${SVC}")
            fi
          done

          # Dockerfile.services change → rebuild all Go services (everything except storefront-web)
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^Dockerfile.services$"; then
            CHANGED=("${SERVICES[@]}")
          fi

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -sc .)
            echo "matrix=${JSON}" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------
  # Build + push each service in parallel
  # --------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0
        with:
          cosign-release: "v2.2.3"

      - name: Build, Push and Sign
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/ecommerce-repo/${SERVICE}:${TAG}"

          echo "=== Building ${SERVICE} ==="

          if [[ "${SERVICE}" == "storefront-web" ]]; then
            docker build \
              -t "${IMAGE}" \
              -f services/storefront-web/Dockerfile services/storefront-web/
          else
            docker build \
              --build-arg SERVICE_NAME="${SERVICE}" \
              -t "${IMAGE}" \
              -f Dockerfile.services .
          fi

          docker push "${IMAGE}"
          cosign sign --yes "${IMAGE}"

          echo "✅ ${SERVICE} pushed as ${IMAGE}"
