name: Platform CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ARTIFACT_REPO: ecommerce-repo
  TF_WORKING_DIR: infra/terraform/aws
  GO_VERSION: "1.24.0"

# =====================================================
# 0. QUALITY GATE
# =====================================================
jobs:
  quality-check:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.work.sum

      - name: Test & Lint
        run: |
          set -e
          cd services
          go test ./... -coverprofile=../coverage.out
          go install github.com/mgechev/revive@v1.3.7
          revive ./... > ../lint-report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage.out
            lint-report.txt

# =====================================================
# 1. BUILD CHECK
# =====================================================
  build-services:
    name: Compile Services
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: |
          cd services
          go build ./...

# =====================================================
# 2. SECURITY SCAN
# =====================================================
  security-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build-services
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@0.16.1
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

# =====================================================
# 3. SONARQUBE
# =====================================================
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: test-reports

      - uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.go.coverage.reportPaths=coverage.out

# =====================================================
# 4. TERRAFORM (ONLY IF INFRA CHANGED)
# =====================================================
  terraform:
    name: Terraform Infra
    runs-on: ubuntu-latest
    needs: security-scan
    environment: prod

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Infra Changes
        id: filter
        run: |
          # Check if infra/terraform changed in the push
          changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "")
          if echo "$changed_files" | grep -q "infra/terraform/"; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        if: steps.filter.outputs.changes == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        if: steps.filter.outputs.changes == 'true'
        with:
          terraform_version: 1.6.6

      - run: terraform init
        if: steps.filter.outputs.changes == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}

      - run: terraform validate
        if: steps.filter.outputs.changes == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}

      - run: terraform plan -out=tfplan
        if: steps.filter.outputs.changes == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}

      - uses: actions/upload-artifact@v4
        if: steps.filter.outputs.changes == 'true'
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - if: github.ref == 'refs/heads/main' && steps.filter.outputs.changes == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

# =====================================================
# 5. BUILD & PUSH IMAGES AND UPDATE MANIFESTS
# =====================================================
  build-and-update-manifests:
    name: Build & Update Manifests
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    environment: prod

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: sigstore/cosign-installer@v3.4.0
        with:
          cosign-release: 'v2.2.3'

      - name: Build, Push & Sign Images
        run: |
          set -e
          # Optimization: Identify changed files to minimize build blast radius
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "")
          TAG=${GITHUB_SHA::7}

          for SERVICE_DIR in $(find services -mindepth 1 -maxdepth 1 -type d); do
            NAME=$(basename "$SERVICE_DIR")

            # Skip shared-lib
            if [[ "$NAME" == "shared-lib" ]]; then
              continue
            fi

            # Monorepo optimization: Only build if service folder OR shared-lib changed
            if echo "$CHANGED" | grep -qE "services/$NAME/|services/shared-lib/"; then
              IMAGE="${{ env.ECR_REGISTRY }}/${ARTIFACT_REPO}/${NAME}:${TAG}"
              
              echo "========================================="
              echo "Building: $NAME"
              echo "========================================="

              if [[ "${NAME}" == "storefront-web" ]]; then
                docker build -t ${IMAGE} -f services/storefront-web/Dockerfile services/storefront-web/
              else
                docker build --build-arg SERVICE_NAME=${NAME} -t ${IMAGE} -f Dockerfile.services .
              fi

              docker push ${IMAGE}
              cosign sign --yes ${IMAGE}
              echo "✅ Built, pushed, and signed: $NAME"
            else
              echo "⏭️ Skipping $NAME (No Changes)"
            fi
          done

      - name: Update Helm Manifests
        run: |
          set -e
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "")
          MANIFESTS_CHANGED=false
          TAG=${GITHUB_SHA::7}

          for svc in services/*; do
            if [ -d "$svc/helm" ]; then
              NAME=$(basename "$svc")
              if echo "$CHANGED" | grep -qE "services/$NAME/|services/shared-lib/"; then
                 echo "Updating image tag for $NAME"
                 sed -i "s/tag: .*/tag: \"${TAG}\"/" "$svc/helm/values.yaml"
                 MANIFESTS_CHANGED=true
              fi
            fi
          done

          if [ "$MANIFESTS_CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add services/*/helm/values.yaml
            git commit -m "chore(cd): update image tags to ${GITHUB_SHA::7} [skip ci]"
            git push origin main
          else
            echo "No manifests needed updating."
          fi
