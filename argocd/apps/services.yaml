# ============================================================
# ArgoCD Applications — Microservices
# Uses multi-source to inject infra/helm/values-prod.yaml
# into every service chart for shared global configuration.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-storefront-service
  namespace: platform-argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  sources:
    - repoURL: https://github.com/Moiz-Ali-Moomin/microservice-ecommerce-aws-cloud-eks
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Moiz-Ali-Moomin/microservice-ecommerce-aws-cloud-eks
      targetRevision: HEAD
      path: services/storefront-service/helm
      helm:
        valueFiles:
          - $values/infra/helm/values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-public
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
